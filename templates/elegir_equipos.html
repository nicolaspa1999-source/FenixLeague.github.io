<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Elegir Equipos - Fenix League</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background-image: url('https://content.skyscnr.com/m/770cd58cf157490f/original/El-Molinon.jpg?resize=1224%3Aauto');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Capa oscura para mejorar legibilidad */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.80);
            z-index: -1;
        }

        .card {
            background-color: rgba(31, 31, 31, 0.92);
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.9);
            padding: 45px 40px;
            max-width: 520px;
            width: 100%;
        }

        .title {
            font-size: 1.9rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #cccccc;
            font-size: 1.05rem;
            margin-bottom: 35px;
        }

        .form-label {
            color: #eeeeee;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-select {
            background-color: #2a2a2a;
            color: white;
            border: 1px solid #666;
            padding: 13px 15px;
            border-radius: 10px;
            font-size: 1.05rem;
        }

        .form-select:focus {
            background-color: #2a2a2a;
            border-color: #00ffcc;
            color: white;
            box-shadow: 0 0 0 0.25rem rgba(0, 255, 204, 0.25);
        }

        .btn-guardar {
            background: linear-gradient(90deg, #00cc66, #00ff99);
            color: #000;
            font-weight: bold;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.18rem;
            margin-top: 30px;
            transition: all 0.3s ease;
        }

        .btn-guardar:hover {
            background: linear-gradient(90deg, #00ff99, #00cc66);
            transform: translateY(-3px);
        }
    </style>
</head>
<body>
    <div class="card text-center">
        <h2 class="title">Elige tus 2 opciones de equipo</h2>
        <p class="subtitle">
            Selecciona 2 equipos diferentes.<br>
            Si otro participante ya los eligió, tendrás un enfrentamiento directo.
        </p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} mb-4">
                    {{ message|safe }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label">Primera opción:</label>
                    <select name="opcion1" class="form-select form-select-lg" required>
                        <option value="">-- Selecciona equipo --</option>
                        {% for equipo in equipos %}
                            <option value="{{ equipo.id }}">{{ equipo.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Segunda opción:</label>
                    <select name="opcion2" class="form-select form-select-lg" required>
                        <option value="">-- Selecciona equipo --</option>
                        {% for equipo in equipos %}
                            <option value="{{ equipo.id }}">{{ equipo.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <button type="submit" class="btn btn-guardar w-100">
                Guardar mis 2 opciones
            </button>
        </form>
    </div>
</body>
</html>
